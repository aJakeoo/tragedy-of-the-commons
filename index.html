<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tragedy of the Commons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="mascot-pair" aria-hidden="true">
    <div class="mascot mascot-happy"><span class="mascot-mouth"></span></div>
    <div class="mascot mascot-grumpy"><span class="mascot-mouth"></span></div>
  </div>
  <h1 id="game-title">Tragedy of the Commons</h1>
  <p class="muted" id="game-tagline" style="text-align:center">A party game of terrible taste and shared blame.</p>

  <div class="card stack">
    <h2>Create a room</h2>
    <label for="create-name">Your name</label>
    <input type="text" id="create-name" maxlength="20" placeholder="e.g. Jordan">
    <button class="primary" id="create-btn">Create room</button>
    <p class="error hidden" id="create-error"></p>
  </div>

  <div class="card stack">
    <h2>Join a room</h2>
    <label for="join-name">Your name</label>
    <input type="text" id="join-name" maxlength="20" placeholder="e.g. Jordan">
    <label for="join-code">Room code</label>
    <input type="text" id="join-code" maxlength="4" placeholder="e.g. AB3D" style="text-transform:uppercase">
    <button class="primary" id="join-btn">Join room</button>
    <p class="error hidden" id="join-error"></p>
  </div>

  <footer class="build-note">Tragedy of the Commons</footer>

  <script type="module" src="js/landing.js"></script>
</body>
</html>
